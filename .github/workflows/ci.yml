# EcoTrace — Continuous Integration
# Author: Sauryadipta Bhattacharya
#
# Runs on every push to main and on every pull request targeting main.
# Three jobs run in parallel:
#   quality  — linting, type-checking, and format validation
#   test     — Vitest unit tests with coverage reporting
#   e2e      — Playwright end-to-end tests against a production build
#
# All jobs pin to Node 20 (matching engines.node in package.json) and
# install with `npm ci` so the lockfile is the source of truth.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static quality checks — fast, no browser required
  # ---------------------------------------------------------------------------
  quality:
    name: Quality (lint · typecheck · format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier (format check)
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests (Vitest) with V8 coverage
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: End-to-end tests (Playwright, Chromium only for speed)
  # ---------------------------------------------------------------------------
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
